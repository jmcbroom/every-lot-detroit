name: Keepalive

# GitHub disables scheduled workflows after 60 days with no repository activity,
# which would silently stop the posting bot. A monthly empty commit keeps the
# repo active so the schedule stays enabled.
on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Empty commit to keep scheduled workflows enabled
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: keep scheduled workflows enabled"
          git push
